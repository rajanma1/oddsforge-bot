version: '3.8'

services:
  trading-bot:
    build: .
    container_name: oddsforge-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
